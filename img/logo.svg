<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="alchemic.it logo — orange Erlenmeyer flask">
  <!--
    Erlenmeyer flask logo for alchemic.it
    Sticker-style: white outer border, dark inner outline, orange fill, 3 open circles
  -->
  <defs>
    <clipPath id="flask-clip">
      <path d="M46 8 L74 8 L74 14 L74 14 L74 36 L97 72 Q106 88 98 100 Q90 112 74 112 L46 112 Q30 112 22 100 Q14 88 23 72 L46 36 L46 14 Z"/>
    </clipPath>
  </defs>

  <!-- White sticker halo -->
  <path d="M46 8 L74 8 L74 36 L97 72 Q107 90 98 103 Q89 116 74 116 L46 116 Q31 116 22 103 Q13 90 23 72 L46 36 Z"
        fill="white" stroke="white" stroke-width="9" stroke-linejoin="round"/>

  <!-- Flask body — orange fill + dark stroke -->
  <path d="M46 8 L74 8 L74 36 L97 72 Q107 90 98 103 Q89 116 74 116 L46 116 Q31 116 22 103 Q13 90 23 72 L46 36 Z"
        fill="#F26419" stroke="#1C1C1C" stroke-width="5.5" stroke-linejoin="round"/>

  <!-- Three open circles (bubbles) -->
  <circle cx="45" cy="85" r="10" fill="none" stroke="#1C1C1C" stroke-width="4.5"/>
  <circle cx="67" cy="93" r="9"  fill="none" stroke="#1C1C1C" stroke-width="4.5"/>
  <circle cx="72" cy="73" r="8"  fill="none" stroke="#1C1C1C" stroke-width="4.5"/>
</svg>
